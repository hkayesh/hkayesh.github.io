{% comment %} Beyond work — one image, one small panel, kept deliberately brief {% endcomment %}
<section id="beyond" class="section">
  <div class="section__inner">
    <div class="beyond reveal">
      <figure class="beyond__media">
        <img src="{{ '/assets/images/travel.jpg' | relative_url }}"
             alt="Boga Lake in the Bandarban hill district of Bangladesh, surrounded by forested mountains"
             loading="lazy">
      </figure>
      <div class="beyond__body">
        <p class="eyebrow">Beyond Work</p>
        <h2 class="section__title">Off the beaten path</h2>
        <p>
          Away from the keyboard I hike — mountains, lakes, beaches, forests.
          The benchmark so far: a 2015 trek to
          <a href="https://en.wikipedia.org/wiki/Bagakain_Lake" rel="nofollow noopener noreferrer">Boga Lake</a>,
          a remote mountaintop lake in Bandarban, Bangladesh.
        </p>
      </div>
    </div>
  </div>
</section>
